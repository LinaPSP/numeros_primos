<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Fiesta de Números Primos!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Comic Sans MS', 'Inter', sans-serif;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fad0c4, #fbc2eb, #a18cd1);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Burbujas flotantes */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: float 10s infinite ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: white;
            backdrop-filter: blur(2px);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); }
            33% { transform: translateY(-100px) translateX(50px) rotate(120deg); }
            66% { transform: translateY(-20px) translateX(-50px) rotate(240deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 0 #d1d5db, 0 30px 50px rgba(0,0,0,0.2);
            text-align: center;
            z-index: 10;
            width: 350px;
            transform: scale(1);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .container:active { transform: scale(0.95); }

        h1 { color: #ff4757; text-shadow: 2px 2px 0 #ff7f5055; margin-top: 0; }

        input {
            width: 80%;
            padding: 15px;
            border: 4px solid #70a1ff;
            border-radius: 20px;
            font-size: 1.5rem;
            text-align: center;
            outline: none;
            color: #2f3542;
            margin-bottom: 20px;
        }

        #result {
            font-size: 1.2rem;
            margin: 20px 0;
            min-height: 50px;
            font-weight: bold;
        }

        .score-board {
            background: #2f3542;
            color: #ffa502;
            padding: 10px;
            border-radius: 15px;
            display: inline-block;
            font-size: 0.9rem;
        }

        /* Efecto Confeti */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="container" id="card">
        <h1>¿Primo o No? 🎈</h1>
        <div class="score-board">Primos encontrados: <span id="count">0</span></div>
        <br><br>
        <input type="number" id="numInput" placeholder="???" min="0">
        <div id="result">¡Escribe algo divertido!</div>
    </div>

    <script>
        let primeCount = 0;
        const input = document.getElementById('numInput');
        const resultDiv = document.getElementById('result');
        const countSpan = document.getElementById('count');

        // Generar burbujas decorativas
        for (let i = 0; i < 15; i++) {
            createBubble();
        }

        function createBubble() {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 60 + 20 + 'px';
            bubble.style.width = size;
            bubble.style.height = size;
            bubble.style.left = Math.random() * 100 + 'vw';
            bubble.style.top = Math.random() * 100 + 'vh';
            bubble.style.animationDuration = (Math.random() * 10 + 5) + 's';
            bubble.textContent = Math.floor(Math.random() * 100);
            document.body.appendChild(bubble);
        }

        function isPrime(n) {
            if (n < 2) return false;
            for (let i = 2; i <= Math.sqrt(n); i++) {
                if (n % i === 0) return false;
            }
            return n > 1;
        }

        function launchConfetti() {
            for (let i = 0; i < 50; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = '50%';
                c.style.top = '50%';
                c.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                document.body.appendChild(c);

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 10 + 5;
                let x = 0, y = 0;

                const anim = setInterval(() => {
                    x += Math.cos(angle) * velocity;
                    y += Math.sin(angle) * velocity + 2; // Gravedad
                    c.style.transform = `translate(${x}px, ${y}px) rotate(${x}deg)`;
                    if (y > window.innerHeight) {
                        clearInterval(anim);
                        c.remove();
                    }
                }, 20);
            }
        }

        input.addEventListener('input', () => {
            const val = parseInt(input.value);
            if (isNaN(val)) {
                resultDiv.textContent = "¡Escribe un número!";
                resultDiv.style.color = "#2f3542";
                return;
            }

            if (isPrime(val)) {
                resultDiv.textContent = "🌟 ¡SÍ! ¡ES UN PRIMO MÁGICO! 🌟";
                resultDiv.style.color = "#2ed573";
                launchConfetti();
                primeCount++;
                countSpan.textContent = primeCount;
                input.style.borderColor = "#2ed573";
            } else {
                resultDiv.textContent = "Ups... ¡este no es primo! 🍄";
                resultDiv.style.color = "#ff4757";
                input.style.borderColor = "#ff4757";
            }
        });
    </script>
</body>
</html>
